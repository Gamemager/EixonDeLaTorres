<nav class="navbar" [class.scrolled]="scrolled()">
  <div class="nav-inner">
 
    <!-- LOGO -->
    <a class="nav-logo" routerLink="/" (click)="closeMenu()">
      EDT
      <span class="logo-sub">// eixon.dev</span>
    </a>
 
    <!-- LINKS desktop -->
    <ul class="nav-links" [class.open]="menuOpen()">
      <li *ngFor="let link of navLinks">
        <a
          [routerLink]="link.path"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: link.path === '/' }"
          (click)="closeMenu()">
          {{ link.label }}
        </a>
      </li>
    </ul>
 
    <!-- CTA -->
    <a class="nav-cta" routerLink="/elite" (click)="closeMenu()">
      Iniciar proyecto
    </a>
 
    <!-- Mobile hamburger -->
    <button class="hamburger" (click)="toggleMenu()" [class.open]="menuOpen()" aria-label="Menú">
      <span></span><span></span><span></span>
    </button>
 
  </div>
</nav>
